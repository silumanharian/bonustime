<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Misi</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="mobile-app">

<!-- HEADER -->

<header class="page-header">

<a href="home.html">
<i class="bi bi-chevron-left"></i>
</a>

<h3>Misi Harian</h3>

<i class="bi bi-list-check"></i>

</header>



<!-- HERO -->

<section class="mission-hero">

<div>

<h2>Selesaikan Misi</h2>

<p>Dapatkan bonus setiap hari</p>

</div>

<div class="mission-icon">

<i class="bi bi-trophy-fill"></i>

</div>

</section>



<!-- PROGRESS -->

<h4>Progress Hari Ini</h4>

<div class="progress-card">

<div class="progress-top">

<span>2 / 5 Misi</span>

<span>40%</span>

</div>

<div class="progress-bar">

<div class="progress-fill"></div>

</div>

</div>



<!-- LIST -->

<h4>Daftar Misi</h4>

<section class="mission-list">


<div class="mission-card">

<div class="mission-left">

<div class="task-icon blue">
<i class="bi bi-box-arrow-in-right"></i>
</div>

<div>

<b>Login Hari Ini</b>

<p>Reward Rp2.000</p>

</div>

</div>

<button class="done-btn">
Selesai
</button>

</div>





<div class="mission-card">

<div class="mission-left">

<div class="task-icon purple">
<i class="bi bi-person-plus"></i>
</div>

<div>

<b>Undang 1 Teman</b>

<p>Reward Rp10.000</p>

</div>

</div>

<button class="claim-btn">
Klaim
</button>

</div>





<div class="mission-card">

<div class="mission-left">

<div class="task-icon orange">
<i class="bi bi-wallet2"></i>
</div>

<div>

<b>Tarik Dana</b>

<p>Reward Rp5.000</p>

</div>

</div>

<button class="go-btn">
GO
</button>

</div>





<div class="mission-card">

<div class="mission-left">

<div class="task-icon blue">
<i class="bi bi-share"></i>
</div>

<div>

<b>Bagikan Aplikasi</b>

<p>Reward Rp7.500</p>

</div>

</div>

<button class="go-btn">
GO
</button>

</div>





<div class="mission-card">

<div class="mission-left">

<div class="task-icon purple">
<i class="bi bi-gift-fill"></i>
</div>

<div>

<b>Klaim Bonus</b>

<p>Reward Rp3.000</p>

</div>

</div>

<button class="go-btn">
GO
</button>

</div>

</section>

</div>

<script src="script.js"></script>
  <script src="auth.js"></script>

<script>

document.querySelectorAll(".claim-btn").forEach(btn=>{

btn.onclick=function(){

this.innerHTML="Berhasil";

this.style.background="#2ecc71";

alert("Reward berhasil diklaim");

}

})

</script>

</body>
</html>
