<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bonus</title>


<link 
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
rel="stylesheet">


<link rel="stylesheet" href="style.css">


</head>


<body>


<div class="mobile-app">



<!-- HEADER -->

<header class="page-header">


<a href="home.html">

<i class="bi bi-chevron-left"></i>

</a>


<h3>
Bonus
</h3>


<i class="bi bi-gift"></i>


</header>






<!-- BONUS HERO -->


<section class="bonus-hero">


<div>


<i class="bi bi-gift-fill"></i>


<h2>
Bonus Spesial
</h2>


<p>
Nikmati reward menarik setiap hari
</p>


</div>



</section>







<!-- LIST BONUS -->


<h4>
Daftar Bonus
</h4>



<section class="bonus-list">





<div class="bonus-card">


<div class="bonus-icon blue">

<i class="bi bi-star-fill"></i>

</div>



<div>

<b>
Bonus Member
</b>


<p>
Hadiah spesial untuk akun baru
</p>


</div>



<button class="claim-btn">

Klaim

</button>


</div>








<div class="bonus-card">


<div class="bonus-icon purple">

<i class="bi bi-calendar-check"></i>

</div>



<div>

<b>
Bonus Harian
</b>


<p>
Login setiap hari dapat reward
</p>


</div>



<button class="claim-btn">

Klaim

</button>


</div>








<div class="bonus-card">


<div class="bonus-icon orange">

<i class="bi bi-fire"></i>

</div>



<div>

<b>
Bonus Spesial
</b>


<p>
Promo terbatas hari ini
</p>


</div>



<button class="claim-btn">

Klaim

</button>


</div>




</section>








<!-- INFO -->


<section class="bonus-info">


<i class="bi bi-info-circle"></i>


<p>
Selesaikan aktivitas untuk membuka bonus lainnya.
</p>


</section>





</div>





<script src="script.js"></script>


<script>


// tombol klaim


document.querySelectorAll(".claim-btn")
.forEach(btn=>{


btn.onclick=function(){


alert("Bonus berhasil diklaim");


}



});


</script>




</body>

</html>
